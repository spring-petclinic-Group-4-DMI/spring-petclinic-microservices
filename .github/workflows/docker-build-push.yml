name: CI – Docker Build and Push to ECR

# ── TRIGGERS ──────────────────────────────────────────────
# Only runs on push to main or staging (not on every branch)
on:
  push:
    branches:
      - main
      - staging

# ── PERMISSIONS (required for OIDC token) ─────────────────
permissions:
  id-token: write
  contents: read

# ── JOBS ──────────────────────────────────────────────────
jobs:

  # ── JOB 1: Maven Build ────────────────────────────────
  build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build all services
        run: ./mvnw clean install -B -DskipTests

  # ── JOB 2: Docker Build and Push to ECR ───────────────
  docker-build-and-push:
    name: Build and Push – ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        service:
          - name: config-server
            dir: spring-petclinic-config-server
          - name: discovery-server
            dir: spring-petclinic-discovery-server
          - name: api-gateway
            dir: spring-petclinic-api-gateway
          - name: customers-service
            dir: spring-petclinic-customers-service
          - name: vets-service
            dir: spring-petclinic-vets-service
          - name: visits-service
            dir: spring-petclinic-visits-service
          - name: genai-service
            dir: spring-petclinic-genai-service
          - name: admin-server
            dir: spring-petclinic-admin-server
          - name: frontend
            dir: spring-petclinic-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          ./mvnw clean install -P buildDocker \
            -pl ${{ matrix.service.dir }} \
            -am -B -DskipTests

      - name: Tag and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service.name }}
        run: |
          docker tag springcommunity/spring-petclinic-${{ matrix.service.name }}:latest \
            $REGISTRY/spring-petclinic/$SERVICE:$IMAGE_TAG

          docker tag springcommunity/spring-petclinic-${{ matrix.service.name }}:latest \
            $REGISTRY/spring-petclinic/$SERVICE:latest

          docker push $REGISTRY/spring-petclinic/$SERVICE:$IMAGE_TAG
          docker push $REGISTRY/spring-petclinic/$SERVICE:latest